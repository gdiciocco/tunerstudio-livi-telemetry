# TunerStudio -> LIVI telemetry plugin settings.
#
# Mode:
# - bridge: send raw TunerStudio channel updates to the Linux Python bridge over UDP.
# - direct: map TunerStudio output channels inside the plugin and emit
#   Socket.IO/WebSocket telemetry:push directly to LIVI.

livi.telemetry.mode=bridge

# Bridge mode target. The Python bridge listens on the same host/port.
livi.telemetry.udp.host=127.0.0.1
livi.telemetry.udp.port=8765

# Direct mode target. Set only remote.host/remote.port for the common case, or
# override with livi.telemetry.livi.url if LIVI is not at ws://host:port.
# livi.telemetry.mode=direct
# livi.telemetry.remote.host=livi.local
# livi.telemetry.remote.port=4000
# livi.telemetry.livi.url=ws://livi.local:4000
livi.telemetry.event=telemetry:push
livi.telemetry.hz=20

# Optional TSV with columns livi_field and tunerstudio_field.
# Relative paths are resolved from this properties file directory.
# livi.telemetry.fieldMap=../../livi-tunerstudio-field-map.tsv

# Used in direct mode when a TunerStudio fuel level channel is expressed in
# liters but LIVI expects fuelPct.
livi.telemetry.fuel.capacityLiters=25

# Comma-separated TunerStudio output-channel names, or * for every channel.
# Keeping * is usually fine because unmapped fields are ignored.
livi.telemetry.channels=*
